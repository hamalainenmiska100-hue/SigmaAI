name: Build and Deploy Flutter Web to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  CF_TOKEN: ${{ secrets.CF_TOKEN }}
  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare configuration
        run: |
          test -n "$CF_TOKEN" || (echo "Missing secret: CF_TOKEN" && exit 1)
          test -n "$CF_ACCOUNT_ID" || (echo "Missing secret: CF_ACCOUNT_ID" && exit 1)
          test -n "$CF_PAGES_PROJECT" || (echo "Missing variable: CF_PAGES_PROJECT" && exit 1)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href "/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ env.CF_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          projectName: ${{ env.CF_PAGES_PROJECT }}
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
